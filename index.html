<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1a56a0;--blue-lt:#e8f0fb;--blue-dk:#0c3370;--green:#2d8a4e;--green-lt:#e6f3ea;--green-dk:#1a5230;--amber:#BA7517;--amber-lt:#FAEEDA;--pink:#D4537E;--pink-lt:#FBEAF0;--gray:#6B7280;--border:#E5E7EB;--bg:#F9FAFB;--surface:#fff;--text:#111827;--text2:#374151;--text3:#9CA3AF;--radius:10px;--shadow:0 1px 4px rgba(0,0,0,.08)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* NAV */
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.25rem;display:flex;align-items:center;gap:6px;height:52px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px;margin-right:auto}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--blue),var(--green));border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800}
.logo-text{font-size:14px;font-weight:700;color:var(--text);line-height:1.1}
.logo-text small{font-size:10px;font-weight:400;color:var(--text3);display:block}
.nb{padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
.nb:hover,.nb.on{background:var(--bg);border-color:#d1d5db;color:var(--text);font-weight:500}
.nb.adm{border-color:var(--green);color:var(--green-dk);background:var(--green-lt)}
/* LAYOUT */
.main{max-width:860px;margin:0 auto;padding:1.25rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.ct{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:1rem;display:flex;align-items:center;gap:6px}
/* FORMS */
select,input{width:100%;padding:8px 10px;font-size:13px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-family:inherit}
select:focus,input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,160,.1)}
.lbl{font-size:11px;color:var(--text3);margin-bottom:3px;display:block;font-weight:500}
/* BUTTONS */
.btn{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s;font-weight:500}
.btn:hover{background:var(--bg)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.bb{border-color:var(--blue);color:var(--blue);background:var(--surface)}.bb:hover{background:var(--blue-lt)}
.bg{border-color:var(--green);color:var(--green)}.bg:hover{background:var(--green-lt)}
.br{border-color:#f87171;color:#dc2626}.br:hover{background:#fef2f2}
.bsm{padding:4px 10px;font-size:11px}
/* STEPS */
.step-bar{display:flex;margin-bottom:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.si{flex:1;padding:10px 6px;text-align:center;font-size:11px;font-weight:600;color:var(--text3);border-bottom:2px solid transparent}
.si.act{color:var(--blue);border-bottom-color:var(--blue);background:var(--blue-lt)}
.si.dn{color:var(--green);border-bottom-color:var(--green)}
/* TIPO */
.tipo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tc{padding:14px 8px;border:1px solid var(--border);border-radius:9px;background:var(--bg);cursor:pointer;text-align:center;font-size:12px;font-weight:600;color:var(--text2);transition:all .15s}
.tc:hover{border-color:#d1d5db}
.tc.sv{border-width:2px;border-color:var(--blue);background:var(--blue-lt);color:var(--blue-dk)}
.tc.sm{border-width:2px;border-color:var(--amber);background:var(--amber-lt);color:#633806}
.tc.sr{border-width:2px;border-color:var(--pink);background:var(--pink-lt);color:#72243E}
/* BADGES */
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.bbl{background:var(--blue-lt);color:var(--blue-dk)}
.bgl{background:var(--green-lt);color:var(--green-dk)}
.bal{background:var(--amber-lt);color:#633806}
.bpl{background:var(--pink-lt);color:#72243E}
.bgr{background:var(--bg);color:var(--gray);border:1px solid var(--border)}
/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1rem}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow)}
.metric-l{font-size:10px;color:var(--text3);font-weight:500;margin-bottom:2px}
.metric-v{font-size:22px;font-weight:700;color:var(--text)}
.metric-s{font-size:10px;color:var(--text3)}
/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:2fr 70px 60px auto;gap:8px;align-items:end}
/* CLIENT CARDS */
.cc{padding:10px 12px;border:1px solid var(--border);border-radius:9px;cursor:pointer;background:var(--bg);transition:all .15s;display:flex;align-items:center;gap:10px}
.cc:hover{border-color:#d1d5db;background:var(--surface)}
.cc.sb{border:2px solid var(--blue);background:var(--blue-lt)}
.cc.sr2{border:2px solid var(--green);background:var(--green-lt)}
.cc-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:800;flex-shrink:0;background:var(--border)}
.cc.sb .cc-av{background:var(--blue)}
.cc.sr2 .cc-av{background:var(--green)}
.cc-name{font-size:12px;font-weight:600;color:var(--text)}
.cc.sb .cc-name{color:var(--blue-dk)}
.cc.sr2 .cc-name{color:var(--green-dk)}
.cc-city{font-size:10px;color:var(--text3);margin-top:1px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px}
/* FICHA */
.ficha{border-radius:var(--radius);overflow:hidden;margin-bottom:1rem;border:2px solid var(--blue);box-shadow:var(--shadow);animation:fi .2s ease}
.ficha.reg{border-color:var(--green)}
@keyframes fi{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.ficha-hd{padding:14px 16px;display:flex;align-items:center;gap:12px}
.ficha-hd.bog{background:linear-gradient(135deg,var(--blue),#2472c8)}
.ficha-hd.reg{background:linear-gradient(135deg,var(--green),#3aad65)}
.ficha-av{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:800;flex-shrink:0}
.ficha-nombre{color:#fff;font-size:14px;font-weight:700}
.ficha-nit{color:rgba(255,255,255,.8);font-size:10px;margin-top:2px}
.ficha-body{padding:14px 16px;background:var(--surface)}
.ficha-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.campo{background:var(--bg);border-radius:8px;padding:9px 11px}
.campo-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:4px;margin-bottom:3px;font-weight:600}
.campo-val{font-size:13px;font-weight:500;color:var(--text)}
.campo-val.email{color:var(--blue);font-size:12px}
.destino{background:var(--blue-lt);border-radius:9px;padding:11px 13px;border-left:3px solid var(--blue)}
.destino.reg{background:var(--green-lt);border-left-color:var(--green)}
.destino-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--blue);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.destino-lbl.reg{color:var(--green)}
.destino-val{font-size:13px;font-weight:600;color:var(--text)}
.destino-sub{font-size:11px;color:var(--text2);margin-top:2px}
.confirmado{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--green);margin-top:10px;font-weight:600;background:var(--green-lt);padding:7px 10px;border-radius:7px}
/* TABLE */
.tbl{width:100%;font-size:12px;border-collapse:collapse}
.tbl th{text-align:left;font-size:10px;font-weight:700;color:var(--text3);padding:6px 8px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.3px}
.tbl td{padding:8px 8px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg)}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem}
.empty{text-align:center;padding:2.5rem;color:var(--text3);font-size:12px}
.empty i{font-size:28px;display:block;margin-bottom:8px}
/* PESO */
.peso-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px}
.peso-badge{background:var(--blue-lt);color:var(--blue-dk);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
/* PERSONAL */
.doc-personal{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:1rem 0;padding:10px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.dp{text-align:center}
.dp-role{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.dp-name{font-size:12px;font-weight:600;color:var(--text)}
/* NOTIF BAR */
.notif{background:var(--green-lt);border:1px solid var(--green);border-radius:9px;padding:9px 13px;font-size:12px;color:var(--green-dk);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
/* DOCUMENT */
.doc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.doc-top{background:linear-gradient(135deg,var(--blue),var(--green));padding:18px 20px;color:#fff}
.doc-top-name{font-size:20px;font-weight:800;letter-spacing:.3px}
.doc-top-sub{font-size:11px;opacity:.85;margin-top:3px}
.doc-body{padding:1.5rem}
.dh{border-bottom:1px solid var(--border);padding-bottom:1rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:flex-start}
.dm{background:var(--bg);border-radius:8px;padding:10px 12px;font-size:12px}
.dml{font-size:10px;color:var(--text3);font-weight:600;margin-bottom:3px}
.dmv{font-weight:600;color:var(--text)}
.csec{border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:10px}
.chd{background:var(--bg);padding:8px 13px;display:flex;justify-content:space-between;align-items:center;font-size:12px;border-bottom:1px solid var(--border)}
.cht{font-weight:700}
.crow{display:grid;grid-template-columns:3fr 70px 50px 85px;font-size:11px;padding:7px 13px;border-top:.5px solid var(--border);align-items:center}
.crowh{font-size:9px;font-weight:700;color:var(--text3);background:var(--bg);text-transform:uppercase;letter-spacing:.3px;border-top:none;border-bottom:.5px solid var(--border)}
.tvb{background:var(--bg);border-radius:9px;padding:10px 14px;margin-top:10px}
.tvr{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:var(--text2)}
.tvr.tot{font-weight:700;font-size:14px;color:var(--text);border-top:1px solid var(--border);padding-top:8px;margin-top:6px}
.fr{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;border-top:1px solid var(--border);padding-top:1rem;margin-top:1rem}
.fb{text-align:center}
.fl{border-bottom:1px solid var(--text);height:32px;margin-bottom:5px}
.flname{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px}
.flbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
/* EDIT FORM */
.efg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.clientrow{border:1px solid var(--border);border-radius:9px;padding:12px 14px;margin-bottom:8px;background:var(--surface)}
/* PIN */
.pin-overlay{max-width:300px;margin:2rem auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;box-shadow:var(--shadow)}
/* PRINT */
@media print{.nav,.nav-row,.btn,.notif{display:none!important}.main{padding:0}.doc{border:none;box-shadow:none}}
</style>
</head>

function rNew(){

  return`<div class="step-bar">${bar}</div>${body}`;

function wFiltCat(v){S.wiz.filtCat=v;S.wiz.form.libroId='';render();}
function wCli(id){S.wiz.clienteId=id;render();}
function wTipo(t){S.wiz.tipo=t;render();}
function wForm(k,v){S.wiz.form[k]=v;}
function wPersonal(k,v){S.wiz.personal[k]=v;}
function wWeight(caja,v){S.wiz.bw[caja]=parseFloat(v)||0;}
function wNext(){
  if(S.wiz.step===1) S.wiz.step=3;
  else S.wiz.step=Math.min(4,S.wiz.step+1);
  if(S.wiz.step===3 && S.sesion && !S.wiz.personal.empacador){
    S.wiz.personal.empacador=S.sesion.nombre;
  }
  render();
}
function wBack(){
  if(S.wiz.step===3) S.wiz.step=1;
  else S.wiz.step=Math.max(1,S.wiz.step-1);
  render();
}
function wAdd(){
  const f=S.wiz.form;if(!f.libroId||f.cant<1||f.caja<1)return;
  const itemTipo=f.tipo||S.wiz.tipo||'venta';
  // Only merge if same book, same box AND same tipo
  const ex=S.wiz.items.find(i=>i.libroId===f.libroId&&i.caja===f.caja&&i.tipo===itemTipo);
  if(ex){ex.cant+=parseInt(f.cant);S.wiz.items=[...S.wiz.items];}
  else S.wiz.items.push({id:S.wiz.nxtId++,libroId:f.libroId,cant:parseInt(f.cant),caja:parseInt(f.caja),tipo:itemTipo});
  S.wiz.form={libroId:'',cant:1,caja:S.wiz.form.caja,tipo:itemTipo};render();
}
function wStartEdit(id){
  const it=S.wiz.items.find(i=>i.id===id);
  if(!it)return;
  S.wiz.editItemId=id;
  S.wiz.editF={cant:it.cant,caja:it.caja,tipo:it.tipo||S.wiz.tipo};
  render();
}
function wSaveEdit(id){
  const it=S.wiz.items.find(i=>i.id===id);
  if(!it)return;
  const f=S.wiz.editF;
  it.cant=parseInt(f.cant)||1;
  it.caja=parseInt(f.caja)||1;
  it.tipo=f.tipo||S.wiz.tipo;
  S.wiz.items=[...S.wiz.items];
  S.wiz.editItemId=null;
  S.wiz.editF={};
  render();
}
function wRem(id){S.wiz.items=S.wiz.items.filter(i=>i.id!==id);render();}

const API_URL = ''; // Ej: 'https://enlace-backend.railway.app'
// Si API_URL está vacío, todo funciona con localStorage (modo demo)

// Guardar pedido: intenta API, cae a localStorage si no hay backend
async function guardarPedidoAPI(pedidoData) {
  if (!API_URL) return null; // Modo demo: usar localStorage
  try {
    const res = await fetch(`${API_URL}/api/pedidos`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(pedidoData)
    });
    if (!res.ok) throw new Error('API error');
    return await res.json();
  } catch (err) {
    console.log('API no disponible, guardando local:', err.message);
    return null;
  }
}

// Cargar clientes desde API (si está disponible)
async function cargarClientesAPI() {
  if (!API_URL) return null;
  try {
    const res = await fetch(`${API_URL}/api/clientes`);
    if (!res.ok) throw new Error('API error');
    return await res.json();
  } catch { return null; }
}

function buildWAText(pedidoData){
  const c=gc(pedidoData.clienteId);
  const cx=cajasOf(pedidoData.items);
  const te=totEj(pedidoData.items);
  const tp=totPvp(pedidoData.items);
  const kg=totKg(pedidoData.bw);
  const pers=pedidoData.personal||{};
  let txt=`📦 *LISTA DE EMPAQUE - Enlace Editorial*\n`;
  txt+=`📋 Folio: *${pedidoData.folio}*\n`;
  txt+=`📅 Fecha: ${new Date(pedidoData.ts||Date.now()).toLocaleDateString('es-CO')}\n\n`;
  txt+=`👤 *Cliente:* ${c.nombre||'—'}\n`;
  txt+=`📍 *Entrega:* ${pedidoData.dirEntrega||c.direccion||'—'}, ${c.ciudad||''}\n`;
  txt+=`📞 ${c.telefono||'—'}\n\n`;
  txt+=`📊 *Resumen:* ${cx.length} caja(s) · ${te} ejemplares · *$${fN(tp)} PVP*${kg>0?' · '+kg.toFixed(1)+' kg':''}\n\n`;
  cx.forEach(n=>{
    const its=pedidoData.items.filter(i=>i.caja===n);
    const cajaPeso=parseFloat((pedidoData.bw||{})[n])||0;
    txt+=`📦 *Caja ${n}*${cajaPeso>0?' ('+cajaPeso.toFixed(1)+' kg)':''}:\n`;
    its.forEach(it=>{const l=gl(it.libroId);txt+=`  • ${l.titulo||'—'} [${it.tipo}] x${it.cant} = $${fN((l.pvp||0)*it.cant)}\n`;});
    txt+='\n';
  });
  txt+=`👥 Alistador: ${pers.alistador||'—'} | Verificador: ${pers.verificador||'—'} | Empacador: ${pers.empacador||'—'}\n\n`;
  txt+=`_Enlace Editorial · NIT 900.545.111-3_`;
  return txt;
}

function enviarWhatsAppCliente(pedidoData){
  const c=gc(pedidoData.clienteId);
  const texto=buildWAText(pedidoData);
  const encoded=encodeURIComponent(texto);
  const tel=(c.telefono||'').replace(/[^0-9]/g,'');
  const telFull=tel.startsWith('57')?tel:'57'+tel;
  if(tel){
    window.open('https://wa.me/'+telFull+'?text='+encoded,'_blank');
  } else {
    // No hay teléfono — copiar al portapapeles
    navigator.clipboard?.writeText(buildWAText(pedidoData)).then(()=>alert('✅ Texto copiado. Pégalo en WhatsApp.'));
  }
}

function buildEmailBody(pedidoData){
  const c=gc(pedidoData.clienteId);
  const cx=cajasOf(pedidoData.items);
  const te=totEj(pedidoData.items);
  const tp=totPvp(pedidoData.items);
  const kg=totKg(pedidoData.bw);
  const pers=pedidoData.personal||{};
  let body=`LISTA DE EMPAQUE - Enlace Editorial\n`;
  body+=`Folio: ${pedidoData.folio}\n`;
  body+=`Fecha: ${new Date(pedidoData.ts).toLocaleDateString('es-CO')}\n`;
  body+=`\n=== CLIENTE ===\n`;
  body+=`${c.nombre||'—'} · ${c.ciudad||''}\n`;
  body+=`Dirección entrega: ${pedidoData.dirEntrega||c.direccion||'—'}\n`;
  body+=`\n=== RESUMEN ===\n`;
  body+=`Cajas: ${cx.length} | Ejemplares: ${te} | PVP Total: $${fN(tp)}${kg>0?' | Peso: '+kg.toFixed(1)+' kg':''}\n`;
  body+=`Personal: Alistador: ${pers.alistador||'—'} | Verificador: ${pers.verificador||'—'} | Empacador: ${pers.empacador||'—'}\n`;
  body+=`\n=== DETALLE POR CAJA ===\n`;
  cx.forEach(n=>{
    const its=pedidoData.items.filter(i=>i.caja===n);
    body+=`\nCaja ${n}:\n`;
    its.forEach(it=>{
      const l=gl(it.libroId);
      body+=`  - ${l.titulo||'—'} · ${it.tipo||pedidoData.tipo} · ${it.cant} ej. · $${fN((l.pvp||0)*it.cant)}\n`;
    });
  });
  body+=`\n==============================\n`;
  body+=`Enlace Editorial · NIT: ${E.nit}\n`;
  body+=`${E.email}\n`;
  return body;
}

function enviarCorreo(folio){
  // Construir pedido temporal del wizard actual
  const w=S.wiz;
  const c=gc(w.clienteId);
  const pedTemp={folio,clienteId:w.clienteId,tipo:w.tipo,items:w.items,personal:w.personal,bw:w.bw,dirEntrega:w.dirOverride||c.direccion||'',ts:Date.now()};
  const asunto=encodeURIComponent(`Lista de Empaque ${folio} - Enlace Editorial`);
  const cuerpo=encodeURIComponent(buildEmailBody(pedTemp));
  const dest=c.email||'';
  const cc=encodeURIComponent(E.email);
  // Abre cliente de correo con los datos pre-llenados
  const mailtoLink=`mailto:${dest}?cc=${cc}&subject=${asunto}&body=${cuerpo}`;
  if(mailtoLink.length > 2000){
    // Mailto tiene límite — abrir solo con datos básicos
    const mini=encodeURIComponent(`Lista de Empaque ${folio} - Ver adjunto`);
    window.open(`mailto:${dest}?cc=${cc}&subject=${asunto}&body=${encodeURIComponent('Folio: '+folio+' | Cliente: '+c.nombre+'\nPVP: $'+fN(totPvp(pedTemp.items))+'\n\nVer lista completa adjunta.')}`)
  } else {
    window.open(mailtoLink);
  }
  // Nota SMTP
  alert('📧 Se abrió tu cliente de correo con los datos pre-llenados.\n\nPara envío automático sin abrir el correo, conectamos el servidor SMTP en el siguiente paso.');
}

function enviarCorreoPedido(pedId){
  const p=S.pedidos.find(x=>x.id===pedId);
  if(!p)return;
  const c=gc(p.clienteId);
  const asunto=encodeURIComponent(`Lista de Empaque ${p.folio} - Enlace Editorial`);

function compartirWhatsApp(pedId){
  const p=S.pedidos.find(x=>x.id===pedId);if(!p)return;
  const c=gc(p.clienteId);
  const cx=cajasOf(p.items);
  const te=totEj(p.items);
  const tp=totPvp(p.items);
  const kg=totKg(p.bw);
  const pers=p.personal||{};
  const NL='\n';
  const SEP='━━━━━━━━━━━━━━━━━━━━━━';
  let txt='*LISTA DE EMPAQUE - Enlace Editorial*'+NL+SEP+NL;
  txt+='Folio: *'+p.folio+'*'+NL;
  txt+='Fecha: '+fD(p.ts)+NL+NL;
  txt+='Cliente: *'+c.nombre+'*'+NL;
  txt+='Ciudad: '+c.ciudad+NL;
  txt+='Direccion: '+(p.dirEntrega||c.direccion||'-')+NL+NL;
  txt+='Cajas: '+cx.length+' | Ejemplares: '+te+(kg>0?' | Peso: '+kg.toFixed(1)+' kg':'')+NL;
  txt+='Total PVP: *$'+fN(tp)+'*'+NL;
  if(pers.empacador) txt+=NL+'Empacador: '+pers.empacador;
  txt+=NL+SEP+NL;
  cx.forEach(function(n){
    const its=p.items.filter(function(i){return i.caja===n;});
    const kn=parseFloat((p.bw||{})[n])||0;
    txt+=NL+'Caja '+n+(kn>0?' ('+kn.toFixed(1)+' kg)':'')+':'+NL;
    its.forEach(function(it){
      const l=gl(it.libroId);
      txt+='  - '+(l.titulo||'-')+' ['+it.tipo+'] x'+it.cant+NL;
    });
  });
  txt+=NL+'Enlace Editorial - NIT '+E.nit;
  window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');
}
